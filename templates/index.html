<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Osteoporosis Risk Prediction</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">
    <h1>Osteoporosis Risk Prediction</h1>

    <form action="/predict" method="POST">

        <input type="number" name="Age" placeholder="Enter Age" required>

        <select name="Gender" required>
            <option value="">Gender</option>
            <option value="Male">Male</option>
            <option value="Female">Female</option>
        </select>

        <select name="Hormone" required>
            <option value="">Hormone</option>
            <option value="Normal">Normal</option>
            <option value="Postmenopausal">Postmenopausal</option>
        </select>

        <select name="FHistory" required>
            <option value="">Family History</option>
            <option value="Yes">Yes</option>
            <option value="No">No</option>
        </select>

        <select name="Race" required>
            <option value="">Select Race</option>
            <option value="Asian">Asian</option>
            <option value="African American">African American</option>
            <option value="Caucasian">Caucasian</option>
            <option value="Hispanic">Hispanic</option>
        </select>

        <select name="Weight" required>
            <option value="">Select Weight</option>
            <option value="Underweight">Underweight</option>
            <option value="Normal">Normal</option>
        </select>

        <select name="CalciumIn" required>
            <option value="">Calcium Intake</option>
            <option value="Low">Low</option>
            <option value="Adequate">Adequate</option>
        </select>

        <select name="Activity" required>
            <option value="">Select Activity</option>
            <option value="Sedentary">Sedentary</option>
            <option value="Active">Active</option>
        </select>

        <select name="Smoking" required>
            <option value="">Smoking</option>
            <option value="Yes">Yes</option>
            <option value="No">No</option>
        </select>

        <select name="MedCondition" required>
            <option value="">Medical Condition</option>
            <option value="None">None</option>
            <option value="Hyperthyroidism">Hyperthyroidism</option>
            <option value="Rheumatoid Arthritis">Rheumatoid Arthritis</option>
        </select>

        <select name="Medications" required>
            <option value="">Medications</option>
            <option value="None">None</option>
            <option value="Corticosteroids">Corticosteroids</option>
        </select>

        <select name="Fractures" required>
            <option value="">Fractures History</option>
            <option value="Yes">Yes</option>
            <option value="No">No</option>
        </select>

        <button type="submit">Predict</button>

    </form>
</div>

</body>
</html>
